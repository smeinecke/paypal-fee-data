name: Verify Publication

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out data repo with crawler submodule
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@b5f58b2abc5763ade55e4e9d0fe52cd1ff7979ca # v5.2.1
        with:
          version: "0.11.12"

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install crawler
        working-directory: ./crawler
        run: uv sync --frozen

      - name: Run full crawler checks
        working-directory: ./crawler
        run: make all

      - name: Validate generated data
        working-directory: ./crawler
        run: uv run paypal-fee-crawler validate .. --strict --require-all-complete

      - name: Run publication gate
        run: bash scripts/verify_publication.sh

      - name: Verify workflow hardening
        run: python3 scripts/verify_workflows.py
