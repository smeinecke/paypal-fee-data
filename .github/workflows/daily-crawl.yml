name: Daily Crawl

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: paypal-fee-data-daily-crawl
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out data repo with crawler submodule
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@b5f58b2abc5763ade55e4e9d0fe52cd1ff7979ca # v5.2.1
        with:
          version: "0.11.12"

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install crawler dependencies
        working-directory: ./crawler
        run: uv sync --frozen

      - name: Run crawler
        working-directory: ./crawler
        run: |
          uv run paypal-fee-crawler crawl \
            --output .. \
            --atomic \
            --fail-on-regression \
            --report /tmp/crawl-report.json

      - name: Validate generated data
        working-directory: ./crawler
        run: uv run paypal-fee-crawler validate .. --strict --require-all-complete

      - name: Run publication gate
        run: bash scripts/verify_publication.sh

      - name: Commit generated changes
        run: |
          set -euo pipefail

          git config user.name "Auto Update Bot"
          git config user.email "bot@github.com"

          git add \
            change-report.json \
            json \
            meta \
            schemas \
            README.md

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Daily PayPal fee update"
          git push origin HEAD:main

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: crawl-diagnostics
          if-no-files-found: warn
          path: |
            /tmp/crawl-report.json
            meta/crawl-report.json
            change-report.json
            meta/crawler-revision.json
            meta/transient-failures.json
            meta/unsupported-countries.json
            json
            meta
            schemas
            README.md
